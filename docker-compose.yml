services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: rashtgold_app
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        depends_on:
            - mysql
        networks:
            - rashtgold_net

    nginx:
        image: docker.arvancloud.ir/library/nginx:1.26.2-alpine
        container_name: rashtgold_nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - rashtgold_net

    mysql:
        image: docker.arvancloud.ir/library/mysql:8.0.37
        container_name: rashtgold_mysql
        restart: unless-stopped
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: rashtgold_worldcup
            MYSQL_USER: rashtgold
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - rashtgold_net

    phpmyadmin:
        image: docker.arvancloud.ir/library/phpmyadmin:5.2.1-apache
        container_name: rashtgold_phpmyadmin
        restart: unless-stopped
        ports:
            - "8081:80"
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
        depends_on:
            - mysql
        networks:
            - rashtgold_net

volumes:
    mysql_data:

networks:
    rashtgold_net:
        driver: bridge
